<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Earthquake Monitor Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial,sans-serif}

body{
background:#0b1220;
color:#fff;
}

header{
padding:20px;
background:linear-gradient(90deg,#0d47a1,#1976d2);
box-shadow:0 5px 20px rgba(0,0,0,.4);
}

header h1{
font-size:28px;
}

header p{
opacity:.8;
margin-top:5px;
}

.container{
display:grid;
grid-template-columns:340px 1fr;
height:calc(100vh - 90px);
}

.sidebar{
background:#111827;
overflow:auto;
border-right:1px solid #1f2937;
}

.map{
height:100%;
}

#map{
height:100%;
width:100%;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:15px;
}

.card{
background:#1f2937;
padding:15px;
border-radius:12px;
text-align:center;
}

.card h2{
font-size:30px;
margin-top:5px;
}

.list{
padding:15px;
}

.item{
padding:12px;
margin-bottom:10px;
background:#1f2937;
border-radius:10px;
cursor:pointer;
transition:.25s;
}

.item:hover{
background:#374151;
}

.mag{
font-weight:bold;
font-size:18px;
}

.red{color:#ff5252}
.orange{color:#ff9800}
.yellow{color:#ffd600}
.green{color:#4caf50}

small{
color:#9ca3af;
}

footer{
padding:10px;
text-align:center;
background:#111827;
font-size:13px;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
grid-template-rows:420px auto;
}

.sidebar{
order:2;
}

}
</style>
</head>

<body>

<header>
<h1>🌎 Earthquake Monitor Pro</h1>
<p>Datos en tiempo real (USGS GeoJSON Feed)</p>
</header>

<div class="container">

<div class="sidebar">

<div class="stats">

<div class="card">
<div>Total</div>
<h2 id="total">0</h2>
</div>

<div class="card">
<div>Mayor Magnitud</div>
<h2 id="maxmag">0</h2>
</div>

<div class="card">
<div>Magnitud 4+</div>
<h2 id="strong">0</h2>
</div>

<div class="card">
<div>Actualizado</div>
<h2 id="updated">--</h2>
</div>

</div>

<div class="list" id="list"></div>

</div>

<div class="map">
<div id="map"></div>
</div>

</div>

<footer>
Actualización automática cada 5 minutos
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map=L.map("map").setView([20,0],2);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19,
attribution:'© OpenStreetMap'
}).addTo(map);

let markers=[];

function color(m){

if(m>=6)return "#ff0000";
if(m>=5)return "#ff5722";
if(m>=4)return "#ff9800";
if(m>=3)return "#ffd600";
return "#4caf50";

}

function radius(m){
return Math.max(5,m*4);
}

async function load(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

const url="https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson";

const r=await fetch(url);

const data=await r.json();

const list=document.getElementById("list");
list.innerHTML="";

let max=0;
let strong=0;

document.getElementById("total").textContent=data.features.length;

data.features.forEach(eq=>{

const p=eq.properties;
const g=eq.geometry.coordinates;

const mag=p.mag||0;

if(mag>max)max=mag;
if(mag>=4)strong++;

const marker=L.circleMarker(
[g[1],g[0]],
{
radius:radius(mag),
color:color(mag),
fillColor:color(mag),
fillOpacity:.7
}
)
.addTo(map)
.bindPopup(`
<b>${p.place}</b><br>
Magnitud: ${mag}<br>
Profundidad: ${g[2]} km<br>
${new Date(p.time).toLocaleString()}
`);

marker.on("click",()=>{
map.setView([g[1],g[0]],6);
});

markers.push(marker);

const div=document.createElement("div");

let cls="green";

if(mag>=6)cls="red";
else if(mag>=5)cls="orange";
else if(mag>=4)cls="yellow";

div.className="item";

div.innerHTML=`
<div class="mag ${cls}">
M ${mag.toFixed(1)}
</div>

<div>${p.place}</div>

<small>
${new Date(p.time).toLocaleString()}
</small>
`;

div.onclick=()=>{
map.setView([g[1],g[0]],6);
marker.openPopup();
}

list.appendChild(div);

});

document.getElementById("maxmag").textContent=max.toFixed(1);
document.getElementById("strong").textContent=strong;
document.getElementById("updated").textContent=
new Date().toLocaleTimeString();

}

load();

setInterval(load,300000);

</script>

</body>
</html>
